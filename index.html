<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Usage Monitor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: transparent;
      color: #e2e8f0;
      overflow: hidden;
      user-select: none;
    }

    .container {
      background: rgba(15, 23, 42, 0.55);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(148, 163, 184, 0.15);
      border-radius: 12px;
      padding: 14px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      -webkit-app-region: drag;
      cursor: move;
      padding-bottom: 4px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.08);
    }

    .titlebar-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .titlebar-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px rgba(34, 197, 94, 0.5);
      flex-shrink: 0;
    }

    .titlebar-dot.loading { background: #eab308; box-shadow: 0 0 6px rgba(234, 179, 8, 0.5); animation: pulse 1.5s ease-in-out infinite; }
    .titlebar-dot.error { background: #ef4444; box-shadow: 0 0 6px rgba(239, 68, 68, 0.5); }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .titlebar h1 { font-size: 12px; font-weight: 600; color: #f8fafc; letter-spacing: 0.3px; }

    .plan-badge {
      font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
      background: rgba(217, 119, 6, 0.2); color: #f59e0b;
      padding: 2px 6px; border-radius: 4px; border: 1px solid rgba(217, 119, 6, 0.3);
    }

    .content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }

    .card {
      background: rgba(30, 41, 59, 0.35);
      border: 1px solid rgba(148, 163, 184, 0.1);
      border-radius: 8px;
      padding: 10px 12px;
    }

    .card-label {
      font-size: 9px; text-transform: uppercase; letter-spacing: 0.8px;
      color: #64748b; margin-bottom: 6px;
    }

    /* Limit gauges */
    .limit-row {
      display: flex;
      flex-direction: column;
      gap: 3px;
      margin-bottom: 8px;
    }

    .limit-row:last-child { margin-bottom: 0; }

    .limit-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .limit-name { font-size: 11px; color: #cbd5e1; font-weight: 500; }
    .limit-pct { font-size: 11px; color: #94a3b8; font-variant-numeric: tabular-nums; }
    .limit-reset { font-size: 9px; color: #475569; }

    .gauge-bg {
      height: 6px;
      background: rgba(148, 163, 184, 0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    .gauge-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s ease;
    }

    .gauge-fill.low { background: linear-gradient(90deg, #22c55e, #4ade80); }
    .gauge-fill.mid { background: linear-gradient(90deg, #eab308, #f59e0b); }
    .gauge-fill.high { background: linear-gradient(90deg, #f97316, #ef4444); }
    .gauge-fill.full { background: linear-gradient(90deg, #ef4444, #dc2626); }

    /* Stats */
    .big-stat { font-size: 26px; font-weight: 700; color: #f59e0b; line-height: 1; }
    .big-stat-sub { font-size: 11px; color: #64748b; margin-top: 3px; }

    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat-item .stat-val { font-size: 16px; font-weight: 700; color: #f8fafc; font-variant-numeric: tabular-nums; }
    .stat-item .stat-lbl { font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; color: #64748b; margin-top: 1px; }

    .row { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; }
    .row-name { font-size: 11px; color: #94a3b8; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 180px; }
    .row-val { font-size: 11px; color: #cbd5e1; font-weight: 600; font-variant-numeric: tabular-nums; flex-shrink: 0; }
    .row-val.cost { color: #f59e0b; }

    .bar-bg { height: 3px; background: rgba(148, 163, 184, 0.1); border-radius: 2px; margin-top: 2px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, #3b82f6, #8b5cf6); transition: width 0.5s ease; }

    .activity-chart { display: flex; align-items: flex-end; gap: 3px; height: 40px; padding-top: 4px; }
    .activity-bar {
      flex: 1; background: linear-gradient(180deg, #8b5cf6, #3b82f6);
      border-radius: 2px 2px 0 0; min-height: 2px; position: relative;
    }
    .activity-bar:hover::after {
      content: attr(data-tip); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
      background: rgba(15, 23, 42, 0.95); border: 1px solid rgba(148, 163, 184, 0.2);
      padding: 2px 6px; border-radius: 4px; font-size: 9px; color: #e2e8f0; white-space: nowrap; pointer-events: none;
    }
    .activity-labels { display: flex; justify-content: space-between; margin-top: 2px; }
    .activity-labels span { font-size: 8px; color: #475569; }

    .footer {
      font-size: 9px; color: #475569; text-align: center;
      padding-top: 4px; border-top: 1px solid rgba(148, 163, 184, 0.06);
    }

    .error-msg {
      font-size: 10px; color: #fca5a5; background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.15); border-radius: 6px; padding: 6px 8px;
    }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.2); border-radius: 2px; }

    /* Settings */
    .settings-btn {
      position: absolute;
      bottom: 10px;
      right: 10px;
      width: 22px;
      height: 22px;
      border: none;
      background: rgba(148, 163, 184, 0.1);
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: no-drag;
      transition: background 0.2s;
      z-index: 10;
    }
    .settings-btn:hover { background: rgba(148, 163, 184, 0.25); }
    .settings-btn svg { width: 13px; height: 13px; fill: #64748b; }
    .settings-btn:hover svg { fill: #94a3b8; }

    .settings-panel {
      display: none;
      position: absolute;
      bottom: 38px;
      right: 10px;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 8px;
      padding: 12px;
      z-index: 20;
      width: 200px;
      -webkit-app-region: no-drag;
    }
    .settings-panel.visible { display: block; }

    .settings-panel label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #94a3b8;
      display: block;
      margin-bottom: 6px;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .slider-row input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: rgba(148, 163, 184, 0.2);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    .slider-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #8b5cf6;
      border: 2px solid rgba(255, 255, 255, 0.2);
      cursor: pointer;
    }

    .slider-val {
      font-size: 11px;
      color: #cbd5e1;
      font-variant-numeric: tabular-nums;
      min-width: 28px;
      text-align: right;
    }

    .settings-divider {
      height: 1px;
      background: rgba(148, 163, 184, 0.15);
      margin: 8px 0;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .toggle-row span {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #94a3b8;
    }

    .toggle {
      position: relative;
      width: 32px;
      height: 18px;
      -webkit-app-region: no-drag;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-track {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: rgba(148, 163, 184, 0.2);
      border-radius: 9px;
      transition: background 0.2s;
    }

    .toggle-track::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 2px;
      bottom: 2px;
      background: #64748b;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    .toggle input:checked + .toggle-track {
      background: rgba(139, 92, 246, 0.4);
    }

    .toggle input:checked + .toggle-track::before {
      transform: translateX(14px);
      background: #8b5cf6;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="titlebar">
      <div class="titlebar-left">
        <div class="titlebar-dot loading" id="status-dot"></div>
        <h1>Claude Usage</h1>
      </div>
      <div class="plan-badge">MAX</div>
    </div>
    <div class="content" id="content"></div>
    <div class="footer" id="footer">Loading...</div>

    <button class="settings-btn" id="settings-btn" title="Settings">
      <svg viewBox="0 0 24 24"><path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.53a7.76 7.76 0 0 0 .07-1 7.76 7.76 0 0 0-.07-.97l2.11-1.63a.5.5 0 0 0 .12-.64l-2-3.46a.5.5 0 0 0-.61-.22l-2.49 1a7.15 7.15 0 0 0-1.69-.98l-.38-2.65A.49.49 0 0 0 14 2h-4a.49.49 0 0 0-.49.42l-.38 2.65a7.15 7.15 0 0 0-1.69.98l-2.49-1a.5.5 0 0 0-.61.22l-2 3.46a.49.49 0 0 0 .12.64l2.11 1.63a7.76 7.76 0 0 0-.07.97 7.76 7.76 0 0 0 .07 1l-2.11 1.63a.5.5 0 0 0-.12.64l2 3.46a.5.5 0 0 0 .61.22l2.49-1a7.15 7.15 0 0 0 1.69.98l.38 2.65c.05.24.26.42.49.42h4c.24 0 .44-.18.49-.42l.38-2.65a7.15 7.15 0 0 0 1.69-.98l2.49 1a.5.5 0 0 0 .61-.22l2-3.46a.49.49 0 0 0-.12-.64l-2.11-1.63Z"/></svg>
    </button>

    <div class="settings-panel" id="settings-panel">
      <label>Transparency</label>
      <div class="slider-row">
        <input type="range" id="opacity-slider" min="10" max="95" value="55">
        <span class="slider-val" id="opacity-val">55%</span>
      </div>
      <div class="settings-divider"></div>
      <div class="toggle-row">
        <span>Run on startup</span>
        <label class="toggle">
          <input type="checkbox" id="autolaunch-toggle">
          <span class="toggle-track"></span>
        </label>
      </div>
    </div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
